<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InnerCircle{% endblock %}</title>
  <style>
    :root {
      --bg: #e9ebf0; --bg-card: #f8f8fa; --bg-hover: #f0f1f4;
      --text: #1a1a2e; --text-muted: #555; --text-faint: #888;
      --border: #dcdee3; --border-light: #ececef;
      --primary: #4f46e5; --primary-hover: #4338ca; --primary-faint: rgba(79,70,229,.08);
      --danger: #b91c1c; --danger-bg: #fee2e2; --danger-border: #fecaca;
      --success: #15803d; --success-bg: #dcfce7; --success-border: #bbf7d0;
      --shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    body.dark {
      --bg: #0f0f1a; --bg-card: #1a1a2e; --bg-hover: #22223a;
      --text: #e2e2ef; --text-muted: #9999b0; --text-faint: #555568;
      --border: #2a2a3e; --border-light: #22223a;
      --primary: #818cf8; --primary-hover: #6366f1; --primary-faint: rgba(129,140,248,.1);
      --danger: #f87171; --danger-bg: rgba(248,113,113,.1); --danger-border: rgba(248,113,113,.2);
      --success: #4ade80; --success-bg: rgba(74,222,128,.1); --success-border: rgba(74,222,128,.2);
      --shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
    a { color: var(--primary); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }

    @media (min-width: 1200px) { html { font-size: 112%; } }
    @media (min-width: 1600px) { html { font-size: 120%; } }

    nav { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: .7rem 1.5rem; display: flex; align-items: center; gap: 1.25rem; transition: background .2s, border .2s; position: relative; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--primary); text-decoration: none; margin-right: auto; }
    nav a { font-size: .85rem; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: .5rem; flex-direction: column; gap: 4px; }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: .2s; }
    .nav-links { display: flex; align-items: center; gap: 1.25rem; }
    .theme-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .theme-btn:hover { border-color: var(--primary); }

    .notif-link { position: relative; font-size: .95rem; text-decoration: none !important; }
    .notif-badge { position: absolute; top: -7px; right: -9px; background: var(--danger); color: #fff; font-size: .55rem; font-weight: 700; padding: .1rem .32rem; border-radius: 50%; min-width: 14px; text-align: center; line-height: 1.2; }

    @media (max-width: 768px) {
      .nav-toggle { display: flex; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; flex-direction: column; gap: .75rem; z-index: 100; box-shadow: var(--shadow); align-items: flex-start; }
      .nav-links.open { display: flex; }
      .container { margin-top: 1.25rem; }
    }

    .container { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: var(--bg-card); border-radius: 10px; box-shadow: var(--shadow); padding: 1.75rem; transition: background .2s; }
    .card-sm { padding: 1.25rem; }

    label { display: block; font-weight: 600; margin-bottom: .2rem; font-size: .82rem; }
    input, textarea, select { width: 100%; padding: .6rem .7rem; border: 1px solid var(--border); border-radius: 7px; font-size: .9rem; margin-bottom: .85rem; background: var(--bg); color: var(--text); transition: border .15s; }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-faint); }
    textarea { resize: vertical; min-height: 120px; font-family: inherit; }
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1.02rem;
      height: 1.02rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      margin: 0;
      background: var(--bg-card);
      cursor: pointer;
      position: relative;
      vertical-align: middle;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    input[type="checkbox"]:hover { border-color: var(--primary); }
    input[type="checkbox"]:focus { outline: none; box-shadow: 0 0 0 3px var(--primary-faint); border-color: var(--primary); }
    input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
    input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      width: .24rem;
      height: .5rem;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      left: .34rem;
      top: .16rem;
    }
    input[type="checkbox"]:disabled { opacity: .55; cursor: not-allowed; }

    .btn { display: inline-block; padding: .55rem 1.1rem; border-radius: 7px; font-size: .85rem; font-weight: 600; border: none; cursor: pointer; transition: background .15s, transform .1s; text-decoration: none; }
    .btn:hover { text-decoration: none; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
    .btn-danger:hover { opacity: .85; }
    .btn-ghost { background: var(--primary-faint); color: var(--primary); }
    .btn-ghost:hover { opacity: .85; }
    .btn-block { width: 100%; text-align: center; }
    .btn-sm { padding: .3rem .6rem; font-size: .75rem; }

    .alert-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); padding: .6rem .7rem; border-radius: 7px; margin-bottom: .85rem; font-size: .85rem; }
    .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); padding: .6rem .7rem; border-radius: 7px; margin-bottom: .85rem; font-size: .85rem; }

    .text-muted { color: var(--text-muted); }
    .text-faint { color: var(--text-faint); }
    .text-sm { font-size: .8rem; }
    .text-center { text-align: center; }
    .mt-1 { margin-top: .5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: .5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .flex { display: flex; }
    .gap-1 { gap: .5rem; }
    .gap-2 { gap: .75rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .75rem; }
    .stat-box { background: var(--primary-faint); border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-box .num { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-box .label { font-size: .75rem; color: var(--text-muted); margin-top: .15rem; }

    @media (max-width: 640px) {
      html { font-size: 100%; }
      .container { margin: 1rem auto; padding: 0 .85rem; }
      .card { padding: 1.15rem; }
      .btn { padding: .42rem .85rem; font-size: .8rem; }
      .btn-sm { padding: .26rem .5rem; font-size: .72rem; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .5rem; }
      .stat-box { padding: .7rem .45rem; }
      .stat-box .num { font-size: 1.2rem; }
      .stat-box .label { font-size: .68rem; }
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .7rem .85rem; }
    th { font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { border-bottom: 1px solid var(--border-light); font-size: .85rem; }
    tr:last-child td { border-bottom: none; }

    .title-badge { display: inline-block; font-size: .7rem; padding: .15rem .45rem; border-radius: 4px; font-weight: 600; background: var(--primary-faint); color: var(--primary); margin-right: .3rem; margin-bottom: .2rem; }
    .title-badge[data-created] { cursor: pointer; transition: opacity .15s; }
    .title-badge[data-created]:hover { opacity: .75; }
    .rank-badge { display: inline-block; font-size: .68rem; padding: .15rem .5rem; border-radius: 4px; font-weight: 700; background: var(--primary); color: #fff; }
    .user-badges { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .75rem; }
    .user-badge { width: 22px; height: 22px; border-radius: 5px; background: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .15s, box-shadow .15s; position: relative; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .user-badge:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.18); }
    .user-badge .badge-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; color: #fff; line-height: 0; overflow: hidden; }
    .user-badge .badge-icon svg { width: 14px; height: 14px; fill: #fff; }
    .badge-tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: .45rem .65rem; box-shadow: var(--shadow); z-index: 200; white-space: nowrap; font-size: .72rem; text-align: center; pointer-events: none; }
    .badge-tooltip strong { display: block; font-size: .75rem; color: var(--text); }
    .badge-tooltip span { color: var(--text-muted); font-size: .68rem; }
    .user-badge:hover .badge-tooltip { display: block; animation: popIn .15s ease; }
    .badge-toggle { display: inline-flex; align-items: center; gap: .3rem; padding: .25rem .5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; font-size: .72rem; font-weight: 600; transition: all .15s; }
    .badge-toggle.active { background: var(--primary-faint); color: var(--primary); border-color: var(--primary); }
    .badge-toggle:hover { border-color: var(--primary); }
    .badge-toggle .btgl-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }
    .badge-toggle .btgl-icon svg { width: 12px; height: 12px; }

    .title-popover { position: absolute; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; box-shadow: var(--shadow); z-index: 200; font-size: .82rem; max-width: 250px; animation: popIn .15s ease; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 300; display: flex; align-items: center; justify-content: center; animation: fadeIn .15s; }
    .modal-box { background: var(--bg-card); border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.2); animation: slideUp .2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .comment-card { background: var(--bg-hover); border-radius: 8px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .comment-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; flex-wrap: wrap; }
    .comment-body { font-size: .85rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .reply-card { background: var(--bg); border-radius: 6px; padding: .6rem .8rem; margin-top: .4rem; margin-left: 1.2rem; }

    {% block extra_css %}{% endblock %}
  </style>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.className = 'dark-pending';
  </script>
</head>
<body>
  {% block nav %}
  <nav>
    <a href="/corners" class="brand">InnerCircle</a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      {% if user is defined and user %}
      <a href="/corners">Corners</a>
      <a href="/dashboard">Dashboard</a>
      {% if user_rank(user) >= 11 %}<a href="/admin">Admin</a>{% endif %}
      <a href="/notifications" class="notif-link">&#128276;{% if unread_count %}<span class="notif-badge">{{ unread_count }}</span>{% endif %}</a>
      <a href="/logout">Log out</a>
      {% endif %}
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme"><span id="ti"></span></button>
    </div>
  </nav>
  {% endblock %}

  {% block body %}{% endblock %}

  <script>
    (function(){
      var d = document.body;
      if (localStorage.getItem('theme') === 'dark') d.classList.add('dark');
      function upd(){ document.getElementById('ti').textContent = d.classList.contains('dark') ? '\u2600' : '\u263E'; }
      window.toggleTheme = function(){ d.classList.toggle('dark'); localStorage.setItem('theme', d.classList.contains('dark') ? 'dark' : 'light'); upd(); };
      upd();

      document.addEventListener('click', function(e) {
        if (e.target.closest('.title-popover')) return;
        var old = document.querySelector('.title-popover');
        if (old) old.remove();
        var badge = e.target.closest('.title-badge[data-created]');
        if (!badge) return;
        e.preventDefault();
        var pop = document.createElement('div');
        pop.className = 'title-popover';
        var desc = badge.dataset.desc;
        pop.innerHTML = '<strong>' + badge.textContent.trim() + '</strong>'
          + '<br><span style="font-size:.75rem;color:var(--text-muted);">Granted ' + badge.dataset.created + '</span>'
          + (desc ? '<br><span style="font-size:.75rem;color:var(--text-faint);font-style:italic;">' + desc + '</span>' : '');
        var r = badge.getBoundingClientRect();
        pop.style.top = (r.bottom + window.scrollY + 8) + 'px';
        pop.style.left = Math.max(8, Math.min(r.left + window.scrollX, window.innerWidth - 260)) + 'px';
        document.body.appendChild(pop);
      });
    })();
  </script>
</body>
</html>
